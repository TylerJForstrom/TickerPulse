# Near-live worker: runs the full ingest → NLP → metrics pipeline on a
# schedule and writes results to Postgres. Free on public repos.
# (Editing this file also re-registers the cron with GitHub's scheduler
# and triggers an immediate run — handy after adding source secrets or
# changing worker behavior, e.g. new ingest adapters.)
#
# Required repository secrets for live mode:
#   DATABASE_URL              (Supabase/Neon Postgres connection string)
# Optional: REDDIT_CLIENT_ID, REDDIT_CLIENT_SECRET, REDDIT_USER_AGENT,
#           BLUESKY_HANDLE, BLUESKY_APP_PASSWORD, HF_TOKEN
#
# Without DATABASE_URL the job exits quietly — the deployed demo keeps
# serving the bundled sample artifacts.
name: pipeline

on:
  schedule:
    # Offset minutes: the :00/:15/:30/:45 marks are heavily contended on
    # GitHub's shared scheduler and get throttled or dropped; odd minutes
    # fire far more reliably.
    - cron: "4,19,34,49 * * * *"
  push:
    paths: [".github/workflows/pipeline.yml"]   # editing this file = test run
  workflow_dispatch:
    inputs:
      skip_topics:
        description: "Skip topic clustering (faster run)"
        type: boolean
        default: false

concurrency:
  group: pipeline
  cancel-in-progress: false

env:
  # Node 20 actions are force-migrated to Node 24 on 2026-06-16; opt in
  # early so the cutover can't silently break the cron.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - name: Check live mode
        id: live
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "No DATABASE_URL secret — demo deployment, nothing to do."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v6
        if: steps.live.outputs.enabled == 'true'
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (incl. FinBERT + embeddings)
        if: steps.live.outputs.enabled == 'true'
        run: |
          pip install -r requirements.txt -r requirements-ml.txt

      - name: Cache HuggingFace models
        if: steps.live.outputs.enabled == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-v1

      - name: Run pipeline
        if: steps.live.outputs.enabled == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          ARGS=""
          if [ "${{ inputs.skip_topics }}" = "true" ]; then ARGS="--skip-topics"; fi
          python -m worker.pipeline $ARGS
